<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homa × Blackburn — Drill Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --grey1: #111111;
  --grey2: #1a1a1a;
  --grey3: #2a2a2a;
  --grey4: #3d3d3d;
  --grey5: #666666;
  --grey6: #999999;
  --white: #f5f5f5;
  --lime: #c8f135;
  --lime-dim: rgba(200,241,53,0.12);
  --lime-border: rgba(200,241,53,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── GRID TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,241,53,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,241,53,0.025) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  background: var(--grey1);
  border-bottom: 1px solid var(--grey3);
  padding: 28px 20px 20px;
  position: relative;
  z-index: 1;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.header-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--lime);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.header-title {
  font-size: 30px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.05;
  letter-spacing: -0.03em;
}
.header-title span {
  color: var(--lime);
}
.cobra-badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 5px 10px;
  border: 1px solid var(--grey4);
  color: var(--grey5);
  letter-spacing: 0.1em;
  border-radius: 4px;
  text-align: center;
  line-height: 1.5;
  flex-shrink: 0;
  margin-top: 4px;
}
.header-sub {
  font-size: 12px;
  color: var(--grey5);
  margin-bottom: 16px;
  font-family: 'Space Mono', monospace;
}
.focus-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.focus-pill {
  font-size: 10px;
  padding: 3px 9px;
  border: 1px solid var(--lime-border);
  color: var(--lime);
  border-radius: 2px;
  background: var(--lime-dim);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.05em;
}
.progress-track {
  display: flex;
  gap: 3px;
  margin-top: 0;
}
.prog-seg {
  height: 3px;
  flex: 1;
  background: var(--grey3);
  border-radius: 1px;
  transition: background 0.3s;
}

/* ── TABS ── */
.tabs {
  display: flex;
  overflow-x: auto;
  background: var(--grey1);
  border-bottom: 1px solid var(--grey3);
  scrollbar-width: none;
  position: relative;
  z-index: 1;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  padding: 12px 16px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--grey4);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  font-family: inherit;
}
.tab.active { border-bottom-color: var(--lime); color: var(--lime); }
.tab .tick {
  position: absolute;
  top: 6px; right: 5px;
  font-size: 7px;
  color: var(--lime);
  display: none;
  font-family: 'Space Mono', monospace;
}
.tab.done .tick { display: block; }

/* ── CONTENT ── */
.content {
  padding: 16px 16px 60px;
  position: relative;
  z-index: 1;
}

/* ── DRILL HEADER BLOCK ── */
.drill-head {
  background: var(--grey2);
  border: 1px solid var(--grey3);
  border-top: 2px solid var(--lime);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 14px;
}
.drill-source {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--lime);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.drill-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 2px;
  background: var(--grey3);
  color: var(--grey6);
  border: 1px solid var(--grey3);
  letter-spacing: 0.05em;
}
.badge.beg { color: #4ade80; border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.06); }
.badge.int { color: #fb923c; border-color: rgba(251,146,60,0.2); background: rgba(251,146,60,0.06); }
.badge.adv { color: #f87171; border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.06); }

/* ── PROGRESS ── */
.prog-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--grey5);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.prog-row span:last-child { color: var(--lime); }
.prog-bar {
  height: 3px;
  background: var(--grey3);
  border-radius: 1px;
  overflow: hidden;
  margin-bottom: 14px;
}
.prog-fill {
  height: 100%;
  background: var(--lime);
  border-radius: 1px;
  transition: width 0.4s ease;
}

/* ── STEPS ── */
.steps-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--grey5);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.step {
  display: flex;
  gap: 10px;
  padding: 11px 12px;
  margin-bottom: 6px;
  border-radius: 4px;
  background: var(--grey2);
  border: 1px solid var(--grey3);
  cursor: pointer;
  transition: all 0.15s;
  align-items: flex-start;
}
.step.on {
  background: var(--lime-dim);
  border-color: var(--lime-border);
}
.step-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--grey4);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  transition: all 0.15s;
  font-size: 9px;
  font-weight: 700;
  color: var(--black);
  font-family: 'Space Mono', monospace;
}
.step.on .step-dot {
  background: var(--lime);
  border-color: var(--lime);
}
.step-n {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--lime);
  font-weight: 700;
  min-width: 14px;
  margin-top: 2px;
  flex-shrink: 0;
}
.step-txt {
  font-size: 13px;
  color: #cccccc;
  line-height: 1.6;
  transition: all 0.15s;
}
.step.on .step-txt {
  color: var(--grey5);
  text-decoration: line-through;
}

/* ── QUOTE BLOCK ── */
.quote-block {
  border-left: 2px solid var(--lime);
  padding: 12px 14px;
  margin-bottom: 12px;
  background: var(--grey2);
}
.quote-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--lime);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.quote-text {
  font-size: 13px;
  color: #aaaaaa;
  line-height: 1.6;
  font-style: italic;
}

/* ── TIP BLOCK ── */
.tip-block {
  display: flex;
  gap: 10px;
  padding: 11px 13px;
  background: var(--grey2);
  border: 1px solid var(--grey3);
  border-radius: 4px;
  margin-bottom: 18px;
}
.tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tip-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--grey5);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.tip-text { font-size: 12px; color: var(--grey6); line-height: 1.55; }

/* ── COMPLETE ── */
.complete {
  text-align: center;
  padding: 16px 0 20px;
}
.complete-icon { font-size: 36px; margin-bottom: 8px; }
.complete-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--lime);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.complete-sub { font-size: 12px; color: var(--grey5); margin-bottom: 16px; font-family: 'Space Mono', monospace; }
.btn-row { display: flex; gap: 8px; justify-content: center; }
.btn-ghost {
  padding: 10px 18px;
  border-radius: 3px;
  background: none;
  border: 1px solid var(--grey3);
  color: var(--grey5);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
.btn-solid {
  padding: 10px 22px;
  border-radius: 3px;
  background: var(--lime);
  border: none;
  color: var(--black);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
}
.btn-full {
  width: 100%;
  padding: 11px;
  background: none;
  border: 1px solid var(--grey3);
  border-radius: 3px;
  color: var(--grey5);
  cursor: pointer;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

/* ── ALL DONE ── */
.all-done {
  text-align: center;
  padding: 40px 20px;
  background: var(--grey2);
  border: 1px solid var(--grey3);
  border-top: 2px solid var(--lime);
  border-radius: 4px;
  margin-bottom: 20px;
}
.all-done-icon { font-size: 48px; margin-bottom: 14px; }
.all-done-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--lime);
  letter-spacing: -0.03em;
  margin-bottom: 10px;
}
.all-done-mantra {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--grey5);
  letter-spacing: 0.1em;
  line-height: 1.8;
  margin-bottom: 8px;
}
.all-done-sub {
  font-size: 12px;
  color: var(--grey6);
  font-style: italic;
  line-height: 1.6;
}
</style>
</head>

    source: "BLACKBURN · ANTI-EARLY EXTENSION",

    focus: "Posture & Early Extension Fix",
    level: "beg",
    equip: "Any Iron",
    steps: [
      "Take your normal address position with a mid-iron. Note where your feet are.",
      "Now step ONE BALL WIDTH closer to the ball than feels comfortable. It should feel like you're almost crowding it — like you're addressing it on the hosel.",
      "From this position, your body is now INCENTIVISED to push your butt back and keep your chest down — because there's no room to thrust toward the ball without shanking it.",
      "Make slow swings at 70% effort, focusing on rotating your hips through impact instead of thrusting them at the ball.",
      "From the top: drive the TOES of your lead foot into the tip of your shoe. The foot won't move — but that pressure pushes your butt back and chest down automatically.",
      "Check: at impact your chest should still be angled toward the ground, not standing tall. Your butt should have stayed back, not moved toward the ball.",
      "Once this feels natural at 70%, extend to fuller shots keeping the same feeling.",
    ],
    feel: "Blackburn: 'When you set up like that, you're incentivising your body to push your butt back and create space. If you stand too far from the ball, the instinct is to move toward it.' Tiger Woods and Jon Rahm both set up this way — right over the ball.",
    tip: "This is your direct fix for the round of topped woods and thin irons. Both came from early extension — hips thrusting toward the ball, chest rising, swing arc moving up with your body. Stand closer and there's nowhere for the hips to go except to rotate. Do this drill before every range session until staying in posture becomes automatic.",
  },
  {
    id: 11, icon: "🎈",
    source: "BLACKBURN METHOD",
    name: "Noodle Gate — Impact & Shaft Lean",
    focus: "Impact & Trajectory",
    level: "adv",
    equip: "2 Alignment Sticks + Pool Noodle",
    steps: [
      "Push two alignment sticks into the ground ~4ft apart, about 7ft ahead of your ball position.",
      "Rest a pool noodle across the top — roughly knee to thigh height.",
      "Set the ball slightly back in your stance. Minimal wrist hinge on the backswing.",
      "Goal: hit the ball UNDER the noodle — a low, penetrating, controlled ball flight.",
      "Feel your torso rotating toward the target while your thumbs point DOWN all the way into impact.",
      "The clubhead should TRAIL your hands and body through impact — no flipping, no early release.",
      "Start with three-quarter swings. Progress to full shots only once you can go consistently under.",
    ],
    feel: "Thumbs down, torso leads, clubhead arrives last. That's Homa's impact — low lasers with his wedges, compressed irons. Blackburn: 'He rotates through and hits these low lasers.'",
    tip: "Blackburn used this exact drill with Homa to move him from 161st to 12th in wedge strokes gained. It's the capstone — it only works once the backswing, tempo, and transition drills are already clicking. Save it for last.",
  },
];

let cur = 0;
const ticked = {};
const done = new Set();

function pct(id) {
  const d = drills[id];
  return Math.round((d.steps.filter((_,i) => ticked[`${id}-${i}`]).length / d.steps.length) * 100);
}

function pills() {
  document.getElementById('pills').innerHTML = drills.map((d,i) => {
    const bg = done.has(i) ? '#c8f135' : i===cur ? 'rgba(200,241,53,0.4)' : '#2a2a2a';
    return `<div class="prog-seg" style="background:${bg}"></div>`;
  }).join('');
}

function tabs() {
  document.getElementById('tabs').innerHTML = drills.map((d,i) =>
    `<button class="tab ${i===cur?'active':''} ${done.has(i)?'done':''}" onclick="go(${i})">
      ${d.icon}<span class="tick">✓</span>
    </button>`
  ).join('');
}

function render() {
  const d = drills[cur];
  const p = pct(cur);
  const prog = drills[cur].steps.filter((_,i) => ticked[`${cur}-${i}`]).length;
  const total = d.steps.length;
  const isDone = done.has(cur);
  const allDone = drills.every((_,i) => done.has(i));

  if (allDone) {
    document.getElementById('content').innerHTML = `
      <div class="all-done">
        <div class="all-done-icon">🏆</div>
        <div class="all-done-title">SYSTEM COMPLETE</div>
        <div class="all-done-mantra">
          POSITION OVER PERFECTION<br>
          — MARK BLACKBURN
        </div>
        <div class="all-done-sub">Hip hinge. Stand closer. Ribcage turns. Open the door.<br>Levitate at the top. Dump the club out.<br>Thumbs down, torso leads, noodle goes under.</div>
      </div>
      <button class="btn-full" onclick="resetAll()">RESET ALL DRILLS</button>`;
    return;
  }

  const levelClass = {beg:'beg',int:'int',adv:'adv'}[d.level];
  const levelLabel = {beg:'BEGINNER',int:'INTERMEDIATE',adv:'ADVANCED'}[d.level];

  document.getElementById('content').innerHTML = `
    <div class="drill-head">
      <div class="drill-source">${d.source}</div>
      <div class="drill-name">${d.name}</div>
      <div class="badges">
        <span class="badge ${levelClass}">${levelLabel}</span>
        <span class="badge">▸ ${d.focus}</span>
        <span class="badge">⚙ ${d.equip}</span>
      </div>
    </div>

    <div class="prog-row"><span>PROGRESS</span><span>${prog}/${total} STEPS</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div>

    <div class="steps-label">// STEPS</div>
    ${d.steps.map((s,i) => {
      const on = !!ticked[`${cur}-${i}`];
      return `<div class="step ${on?'on':''}" onclick="tick(${cur},${i})">
        <div class="step-dot">${on?'✓':''}</div>
        <span class="step-n">${String(i+1).padStart(2,'0')}</span>
        <span class="step-txt">${s}</span>
      </div>`;
    }).join('')}

    <div class="quote-block">
      <div class="quote-label">// KEY FEEL</div>
      <div class="quote-text">${d.feel}</div>
    </div>

    <div class="tip-block">
      <span class="tip-icon">⚡</span>
      <div>
        <div class="tip-label">COACH'S NOTE</div>
        <div class="tip-text">${d.tip}</div>
      </div>
    </div>

    ${isDone ? `
      <div class="complete">
        <div class="complete-icon">✅</div>
        <div class="complete-title">DRILL LOCKED IN</div>
        <div class="complete-sub">// ${cur < drills.length-1 ? 'MOVE TO NEXT DRILL' : 'FINAL DRILL COMPLETE'}</div>
        <div class="btn-row">
          <button class="btn-ghost" onclick="resetDrill()">Reset</button>
          ${cur < drills.length-1 ? `<button class="btn-solid" onclick="go(${cur+1})">Next →</button>` : ''}
        </div>
      </div>
    ` : `<button class="btn-full" onclick="resetDrill()">// RESET DRILL</button>`}
  `;
}

function go(i) { cur = i; pills(); tabs(); render(); window.scrollTo(0,0); }

function tick(id, idx) {
  const k = `${id}-${idx}`;
  ticked[k] = !ticked[k];
  const all = drills[id].steps.every((_,i) => ticked[`${id}-${i}`]);
  if (all) done.add(id); else done.delete(id);
  pills(); tabs(); render();
}

function resetDrill() {
  drills[cur].steps.forEach((_,i) => delete ticked[`${cur}-${i}`]);
  done.delete(cur);
  pills(); tabs(); render();
}

function resetAll() {
  Object.keys(ticked).forEach(k => delete ticked[k]);
  done.clear();
  go(0);
}

go(0);
</script>
</body>
</html>
