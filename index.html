<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tommy Fleetwood Drill Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: #d4d8de;
    --text: #1a1e24;
    --muted: #6b7280;
    --faint: #9ca3af;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --teal-mid: rgba(13,148,136,0.15);
    --navy: #1e293b;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--teal) 0%, #34d399 50%, var(--teal) 100%);
  }
  .header-inner {
    padding: 28px 22px 22px;
    position: relative;
    z-index: 1;
  }
  .header-flag {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .flag-bar {
    height: 2px;
    width: 24px;
    background: var(--teal);
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--teal);
    text-transform: uppercase;
    font-weight: 500;
  }
  .header-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 38px;
    color: var(--white);
    line-height: 1.0;
    letter-spacing: -0.02em;
  }
  .header-name em {
    font-style: italic;
    color: #94a3b8;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 13px;
    color: #64748b;
    font-weight: 300;
  }
  .header-meta {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: #94a3b8;
    letter-spacing: 0.05em;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .meta-tag.highlight {
    background: var(--teal-mid);
    color: #34d399;
    border-color: rgba(13,148,136,0.3);
  }

  /* ── PROGRESS ── */
  .progress-row {
    display: flex;
    gap: 4px;
    margin-top: 18px;
    padding-bottom: 2px;
  }
  .prog-pip {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    transition: background 0.4s;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    overflow-x: auto;
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 0 0 auto;
    padding: 12px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #4b5563;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    font-family: inherit;
  }
  .tab-btn.active {
    border-bottom-color: var(--teal);
    color: var(--white);
  }
  .tab-check {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 8px;
    display: none;
    color: var(--teal);
  }
  .tab-btn.done .tab-check { display: block; }

  /* ── CONTENT ── */
  .content {
    padding: 18px 16px 60px;
  }

  /* ── DRILL CARD ── */
  .drill-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .drill-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: var(--accent, var(--teal));
  }
  .drill-source {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent, var(--teal));
    margin-bottom: 3px;
    font-weight: 500;
  }
  .drill-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 21px;
    color: var(--navy);
    margin-bottom: 10px;
    line-height: 1.15;
  }
  .drill-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.level-beginner { color: #059669; border-color: #a7f3d0; background: #ecfdf5; }
  .badge.level-intermediate { color: #d97706; border-color: #fcd34d; background: #fffbeb; }
  .badge.level-advanced { color: #dc2626; border-color: #fca5a5; background: #fef2f2; }

  /* ── PROGRESS BAR ── */
  .prog-wrap { margin-bottom: 16px; }
  .prog-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .prog-header span:last-child { color: var(--accent, var(--teal)); font-weight: 500; }
  .prog-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent, var(--teal));
    transition: width 0.4s ease;
  }

  /* ── STEPS ── */
  .steps-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .step-item {
    display: flex;
    gap: 10px;
    padding: 11px 13px;
    margin-bottom: 7px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    align-items: flex-start;
  }
  .step-item.checked {
    background: var(--teal-light);
    border-color: rgba(13,148,136,0.25);
  }
  .step-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 10px;
    font-weight: 700;
    color: var(--white);
    transition: all 0.2s;
  }
  .step-item.checked .step-circle {
    background: var(--accent, var(--teal));
    border-color: var(--accent, var(--teal));
  }
  .step-num {
    font-size: 11px;
    color: var(--accent, var(--teal));
    font-weight: 600;
    min-width: 14px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .step-text {
    font-size: 13.5px;
    color: #374151;
    line-height: 1.55;
    transition: all 0.2s;
  }
  .step-item.checked .step-text {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* ── FEEL & TIP ── */
  .feel-block {
    background: var(--navy);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .feel-eyebrow {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .feel-text {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.6;
    font-style: italic;
  }
  .tip-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tip-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .tip-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .tip-text {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.55;
  }

  /* ── COMPLETE STATE ── */
  .complete-state {
    text-align: center;
    padding: 16px 0 20px;
  }
  .complete-icon { font-size: 40px; margin-bottom: 8px; }
  .complete-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 20px;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .complete-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .btn-row { display: flex; gap: 8px; justify-content: center; }
  .btn-reset {
    padding: 10px 18px;
    border-radius: 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .btn-next {
    padding: 10px 22px;
    border-radius: 8px;
    background: var(--teal);
    border: none;
    color: var(--white);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
  }
  .btn-reset-drill {
    width: 100%;
    padding: 11px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--faint);
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: inherit;
  }

  /* ── ALL DONE ── */
  .all-done {
    text-align: center;
    padding: 36px 20px;
    background: var(--navy);
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .all-done-icon { font-size: 52px; margin-bottom: 14px; }
  .all-done-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 26px;
    color: var(--white);
    margin-bottom: 8px;
  }
  .all-done-sub {
    font-size: 14px;
    color: #64748b;
    line-height: 1.7;
    font-style: italic;
  }
  .all-done-stripe {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    margin: 18px 0;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- CONTENT -->
<div class="content" id="content"></div>

    feel: "Fleetwood: 'You can't fall back. You have to commit to the target side.' The stomp forces commitment. You can't quit on it.",

  {

      "At halfway back (lead arm parallel to ground), check the tee in the grip: it should point AWAY from your body — not back toward your stomach. If it points at you, your hands have collapsed inward.",
      "Your lead arm should be comfortably extended — not locked rigid, not folding early.",
      "No tee? Use this instead: place a second ball 12 inches directly behind your ball. Try to roll your clubhead over it in the takeaway — it forces a low, wide path rather than an early lift.",
      "Hit slow half shots on the range, prioritising that wide, extended feel over contact quality at first.",
    ],
    feel: "Fleetwood: 'Keeping the clubhead a long way from the golf ball in the takeaway.' Width in the first 18 inches creates the arc — everything else flows from it.",
    tip: "Width is free power. A wide arc gives more time to build speed before impact. Narrow = rushed, steep, weak. Fleetwood's takeaway width is one of the reasons his swing looks effortless even at full speed.",
  },
  {
    id: 11,
    icon: "🎈",
    source: "BLACKBURN METHOD",
    name: "Noodle Gate — Shaft Lean at Impact",
    focus: "Impact & Trajectory",
    level: "Advanced",
    equipment: "2 Alignment Sticks + Pool Noodle",
    accent: "#b45309",
    steps: [
      "Push two alignment sticks into the ground roughly 4 feet apart, about 7 feet ahead of your ball.",
      "Rest a pool noodle across the top, around knee-to-thigh height.",
      "Set the ball slightly back in your stance. Minimal wrist hinge going back.",
      "Your goal: hit the ball UNDER the noodle — a low, piercing, controlled flight.",
      "Feel your torso rotating toward the target while your thumbs point DOWN through impact.",
      "The clubhead should feel like it's TRAILING your hands and body — not flipping or releasing early.",
      "Start with three-quarter swings. Only progress to full shots once you can consistently go under.",
    ],
    feel: "Thumbs point down, torso leads, clubhead is last to arrive. That's Fleetwood's impact — compressed, controlled, penetrating.",
    tip: "Blackburn used this drill to help Homa become one of the best wedge players on tour. It's advanced because it requires the earlier drills to already be working. Save it for last — it's the capstone.",
  },
];

let active = 0;
const checked = {};
const completed = new Set();

function getProgress(id) {
  return drills[id].steps.filter((_, i) => checked[`${id}-${i}`]).length;
}

function renderPills() {
  const el = document.getElementById('pills');
  el.innerHTML = drills.map((d, i) => {
    let bg;
    if (completed.has(i)) bg = d.accent;
    else if (i === active) bg = d.accent + '66';
    else bg = 'rgba(255,255,255,0.1)';
    return `<div class="prog-pip" style="background:${bg}"></div>`;
  }).join('');
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = drills.map((d, i) => {
    const cls = ['tab-btn', i === active ? 'active' : '', completed.has(i) ? 'done' : ''].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="go(${i})" style="${i === active ? `--teal:${d.accent}` : ''}">
      ${d.icon}
      <span class="tab-check" style="color:${d.accent}">✓</span>
    </button>`;
  }).join('');
}

function renderContent() {
  const d = drills[active];
  const prog = getProgress(active);
  const total = d.steps.length;
  const pct = (prog / total) * 100;
  const isDone = completed.has(active);
  const allDone = drills.every((_, i) => completed.has(i));

  // Dynamic CSS var for accent
  document.documentElement.style.setProperty('--accent', d.accent);

  if (allDone) {
    document.getElementById('content').innerHTML = `
      <div class="all-done">
        <div class="all-done-icon">🏆</div>
        <div class="all-done-title">All 12 Drills Done</div>
        <div class="all-done-stripe"></div>
        <div class="all-done-sub">Take Fleetwood's rhythm to the range.<br>Ribcage turns, butt stays back, javelin drops,<br>noodle goes under. You've built the blueprint.</div>
      </div>
      <button class="btn-reset-drill" onclick="resetAll()">Start Over</button>`;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="drill-card" style="--accent:${d.accent}">
      <div class="drill-source">${d.source}</div>
      <div class="drill-name">${d.name}</div>
      <div class="drill-badges">
        <span class="badge level-${d.level.toLowerCase()}">${d.level}</span>
        <span class="badge">🎯 ${d.focus}</span>
        <span class="badge">🏌️ ${d.equipment}</span>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-header">
        <span>Progress</span>
        <span>${prog}/${total}</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%;background:${d.accent}"></div>
      </div>
    </div>

    <div class="steps-label">Steps</div>
    ${d.steps.map((step, i) => {
      const on = !!checked[`${active}-${i}`];
      return `<div class="step-item ${on ? 'checked' : ''}" onclick="tick(${active},${i})">
        <div class="step-circle" style="${on ? `background:${d.accent};border-color:${d.accent}` : ''}">${on ? '✓' : ''}</div>
        <span class="step-num" style="color:${d.accent}">${i+1}</span>
        <span class="step-text">${step}</span>
      </div>`;
    }).join('')}

    <div class="feel-block">
      <div class="feel-eyebrow" style="color:${d.accent}">Key Feel</div>
      <div class="feel-text">${d.feel}</div>
    </div>

    <div class="tip-block">
      <span class="tip-icon">💡</span>
      <div>
        <div class="tip-label">Coach's Note</div>
        <div class="tip-text">${d.tip}</div>
      </div>
    </div>

    ${isDone ? `
      <div class="complete-state">
        <div class="complete-icon">✅</div>
        <div class="complete-title">Drill Complete</div>
        <div class="complete-sub">${active < drills.length - 1 ? 'Ready for the next one.' : 'Final drill — outstanding.'}</div>
        <div class="btn-row">
          <button class="btn-reset" onclick="resetDrill()">Reset</button>
          ${active < drills.length - 1 ? `<button class="btn-next" style="background:${d.accent}" onclick="go(${active+1})">Next →</button>` : ''}
        </div>
      </div>
    ` : `<button class="btn-reset-drill" onclick="resetDrill()">Reset Drill</button>`}
  `;
}

function go(i) {
  active = i;
  renderPills();
  renderTabs();
  renderContent();
  window.scrollTo(0,0);
}

function tick(drillId, stepIdx) {
  const key = `${drillId}-${stepIdx}`;
  checked[key] = !checked[key];
  const all = drills[drillId].steps.every((_, i) => checked[`${drillId}-${i}`]);
  if (all) completed.add(drillId);
  else completed.delete(drillId);
  renderPills();
  renderTabs();
  renderContent();
}

function resetDrill() {
  drills[active].steps.forEach((_, i) => delete checked[`${active}-${i}`]);
  completed.delete(active);
  renderPills();
  renderTabs();
  renderContent();
}

function resetAll() {
  Object.keys(checked).forEach(k => delete checked[k]);
  completed.clear();
  go(0);
}

// Init
go(0);
</script>
</body>
</html>
